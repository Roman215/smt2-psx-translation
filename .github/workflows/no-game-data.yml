name: checks

on:
  push:
  pull_request:

jobs:
  no-game-data:
    name: No game data in the repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no game data or oversized files are tracked
        run: python3 tools/check_no_game_data.py

  compile:
    name: Python sources compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Byte-compile build and tool sources
        run: python3 -m compileall -q build.py release.py tools
